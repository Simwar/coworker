# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: astro/v1
name: coworker

agent:
  build:
    context: .
    dockerfile: Dockerfile
  interfaces:
    messaging: true

models:
  anthropic:
    provider: anthropic
  openai:
    provider: openai

inputs:
  MODEL:
    datatype: string
    default: anthropic/claude-sonnet-4-5
    description: Model to use (e.g. anthropic/claude-sonnet-4-5, openai/gpt-4o)

knowledge:
  data:
    provider: postgres
    persistent: true

dev:
  interfaces:
    messaging:
      adapters: [web]
