# yaml-language-server: $schema=https://astropods.ai/schema/package.json
spec: astro/v1
name: coworker

agent:
  build:
    context: .
    dockerfile: Dockerfile
  interfaces:
    messaging: true

models:
  anthropic:
    provider: anthropic
  openai:
    provider: openai

knowledge:
  db:
    provider: postgres
    persistent: true

dev:
  interfaces:
    messaging:
      adapters: [web]
